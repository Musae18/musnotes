baseURL = "https://musnotess.vercel.app/"
title = "MuS"
theme = "PaperMod"
defaultContentLanguage = "id"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true

[taxonomies]
    tag = "tags"
    category = "categories"
    tema = "tema"

[params]
    env = "production"
    defaultTheme = "auto"
    disableThemeToggle = false
    disableLangToggle = false

    ShowReadingTime = true
    ShowShareButtons = false
    ShowPostNavLinks = true
    ShowBreadCrumbs = false
    ShowToc = false
    ShowWordCount = false
    ShowFullTextinRSS = true

    ShowCodeCopyButtons = false
    disableScrollToTop = false

    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/Musae18"

    [[params.socialIcons]]
        name = "kofi"
        url = "https://trakteer.id/musae18_mus"

    [params.assets]
        favicon = "favicon.ico"

[languages]
    [languages.id]
        languageName = "Bahasa Indonesia"
        languageCode = "id-ID"
        weight = 1
        title = "MuS"

        [languages.id.params]
            description = "Catatan reflektif."

            [languages.id.params.profileMode]
                enabled = true
                title = "MuS"
                subtitle = "Refleksi yang mungkin terlalu percaya diri. Lebih sering bingung daripada tahu."
                imageUrl = "https://github.com/Musae18.png"
                imageTitle = "MuS"
                imageWidth = 120
                imageHeight = 120
                imageBorder = false

                [[languages.id.params.profileMode.buttons]]
                    name = "Catatan Keraguan"
                    url = "posts"

                [[languages.id.params.profileMode.buttons]]
                    name = "Prosa"
                    url = "Prosa"

        [[languages.id.menu.main]]
            name = "Other Work"
            url = "projects"
            weight = 10

    [languages.en]
        languageName = "English"
        languageCode = "en-US"
        weight = 2
        title = "MuS"

        [languages.en.params]
            description = "Working Notes"

            [languages.en.params.profileMode]
                enabled = true
                title = "MuS"
                subtitle = "Perhaps an overconfident reflection—more often confused than knowing."
                imageUrl = "https://github.com/Musae18.png"
                imageTitle = "MuS"
                imageWidth = 120
                imageHeight = 120
                imageBorder = false

                [[languages.en.params.profileMode.buttons]]
                    name = "Notes on Doubt"
                    url = "posts"

                [[languages.en.params.profileMode.buttons]]
                    name = "Prose"
                    url = "Prosa"

        [[languages.en.menu.main]]
            name = "Other Work"
            url = "projects"
            weight = 10
